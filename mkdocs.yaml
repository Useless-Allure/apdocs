site_name: Useless Allure AP Docs
site_url: https://useless-allure.github.io/apdocs/
repo_url: https://github.com/Useless-Allure/apdocs
site_description: Docs for Useless Allure's AP stuff
site_author: Useless Allure
copyright: 2026 Useless Allure

nav:
    - Home: "index.md"
    - River City Ransom EX (GBA):
        - overview: "rivercityransomex/overview.md"
    - Spyro the Dragon (PS1):
        - overview: "spyro/overview.md"
        - blog:
            - overview: "spyro/blog/overview.md"
            - "20260711": "spyro/blog/20260711.md"
            - "20260712": "spyro/blog/20260712.md"
            - "20260718": "spyro/blog/20260718.md"
        - data:
            - overview: "spyro/data/overview.md"
            - scratchpad: "spyro/data/scratchpad.md"

theme:
    name: material
    language: en
    features:
        - content.code.annotate
        - content.code.copy
        - navigation.instant
        - navigation.instant.progress
        - navigation.path
        - navigation.sections
        - toc.follow
        - toc.integrate

    # color settings
    palette:
        -
            scheme: default
            media: "(prefers-color-scheme: light)"
            primary: blue-grey
            accent: deep-purple
            toggle:
                icon: material/lightbulb
                name: turn off the lights
        -
            scheme: slate
            media: "(prefers-color-scheme: dark)"
            primary: black
            accent:  blue
            toggle:
                icon: material/lightbulb-outline
                name: turn on the lights

    # font settings
    font:
        text: Questrial
        code: Source Code Pro

extra:
    version:
        provider: mike

extra_css:
  - stylesheets/extra.css
  - assets/robust-chat/chat.css

extra_javascript:
  - assets/robust-chat/chat.js

docs_dir: "docs"

plugins:
    - 
        mkdocstrings:
            default_handler: python
            enable_inventory: true
            handlers:
                python:
                    inventories:
                        - https://docs.python.org/3/objects.inv
                    options:
                        allow_inspection: true
                        separate_signature: true
                        show_bases: true
                        show_overloads: true
                        show_signature: true
                        show_signature_annotations: true
                        show_signature_type_parameters: true
                        show_source: true
                        signature_crossrefs: true
                    paths:
                        - src
    - 
        privacy                   # mostly to get things away from Google's CDN
    -
        robust-chat:
            # Global participant defaults — same header syntax as a chat block.
            # Applied to every block; per-block `displays:` overrides field by field.
            global_config: |
                displays:
                    claude:
                        type: model
                        style:
                            background_color: #d97757;
                            border_color: #d97757;
                            font_color: #141413;
                    greysondn:
                        type: human
                        style:
                            background_color: #000;
                            border_color: #222;
                            font_color: #fff;
                    gamefreq0:
                        type: human
            # Extensions used to render the *inner* message markdown (separate from the page's
            # own Markdown instance). Default shown.
            inner_markdown_extensions:
                - abbr
                - admonition
                - extra
                - fenced_code
                - footnotes
                - meta
                - pymdownx.details
                - pymdownx.highlight:
                    anchor_linenums: true
                    auto_title: true
                    line_spans: __span
                    linenums: true
                    linenums_style: pymdownx-inline
                    pygments_lang_class: true
                    use_pygments: true
                - pymdownx.inlinehilite
                - pymdownx.superfences:
                    custom_fences:
                        -
                            name: mermaid
                            class: mermaid
                            format: !!python/name:pymdownx.superfences.fence_code_format
                - pymdownx.tasklist:
                    custom_checkbox: true
                - sane_lists
                - tables
            # Set false to manage the CSS/JS yourself.
            copy_assets: true
    -
        search
    -
        social



markdown_extensions:
    - abbr
    - admonition
    - fenced_code
    - footnotes
    - meta
    - pymdownx.details
    - pymdownx.highlight:
        anchor_linenums: true
        auto_title: true
        line_spans: __span
        linenums: true
        linenums_style: pymdownx-inline
        pygments_lang_class: true
        use_pygments: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences:
        custom_fences:
            -
                name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
            -
                name: chat
                class: chat
                format: !!python/name:robust_chat.superfence.format_chat
                validator: !!python/name:robust_chat.superfence.validator
    - pymdownx.tasklist:
        custom_checkbox: true
    - tables
    - toc:
        marker: "[TOC]"
        baselevel: 2
        title: On this page
        permalink: true
        permalink_title: Anchor link to this section for reference
        toc_depth: 6
